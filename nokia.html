<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural-Lite</title>
    <style>
        /* 全局盒模型重置：确保 padding 不会撑破布局 */
        * {
            -webkit-box-sizing: border-box;
            /* 针对老款 WebKit 浏览器 (如 Symbian S60) */
            -moz-box-sizing: border-box;
            /* 针对旧版 Firefox */
            box-sizing: border-box;
            /* 标准语法 */
        }

        /* 保证基础容器满屏 */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
            /* 为绝对定位做参照 */
        }

        /* 绝对的极简黑白风，不使用任何老浏览器看不懂的 flex 布局 */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: sans-serif;
            margin: 0;
            padding: 5px;
        }

        /* 顶部标题固定 */
        h2 {
            font-size: 16px;
            margin: 0;
            padding: 5px;
            border-bottom: 2px solid #000;
            line-height: 20px;
            height: 32px;
            /* 明确高度 */
        }

        /* 中间聊天框绝对定位，自动拉伸 */
        #chat {
            position: absolute;
            top: 32px;
            /* 标题的高度 */
            bottom: 45px;
            /* 底部输入框留出的高度 */
            left: 2.5%;
            /* 配合 width: 95% 居中 */
            width: 95%;
            margin: 5px 0;
            overflow-y: auto;
            border: 1px solid #000000;
            padding: 5px;
            background: #fafafa;
        }

        /* 消息样式 */
        .msg {
            margin-bottom: 10px;
            border-bottom: 1px dashed #cccccc;
            padding-bottom: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg {
            color: #000000;
            font-weight: bold;
        }

        .ai-msg {
            color: #333333;
        }

        /* 输入区 */
        /* 底部输入框绝对定位 */
        .input-area {
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        /* 调整输入框：宽度改为 100% 以填充 td */
        #userInput {
            width: 100%;
            /* 填充父级 td */
            height: 32px;
            padding: 2px 5px;
            border: 1px solid #000;
            font-size: 14px;
            vertical-align: middle;
            /* 确保在老浏览器中不溢出 */
            display: block;
        }

        /* 调整按钮：宽度改为 100% 以填充 td */
        #sendBtn {
            width: 100%;
            /* 填充父级 td */
            height: 32px;
            border: 1px solid #000;
            background-color: #dddddd;
            color: #000;
            font-weight: bold;
            vertical-align: middle;
            cursor: pointer;
            display: block;
        }

        #sendBtn:active {
            background-color: #999999;
            color: #fff;
        }

        input,
        button {
            border-radius: 0;
        }

        /* 老浏览器不支持圆角，去掉可以省下渲染开销 */

        /* 强制消除标题顶部的默认留白 */
        h2 {
            margin-top: 0px;
            line-height: 20px;
        }
    </style>
</head>

<body>

    <h2>Neural-Lite 终端</h2>

    <div id="chat">
        <div class="msg ai-msg"><b>AI:</b> 连接就绪。请输入你的指令</div>
    </div>

    <form class="input-area" onsubmit="sendMessage(); return false;">
        <table style="width: 95%; margin: 0 auto; table-layout: fixed;" cellspacing="0" cellpadding="0" border="0">
            <tr>
                <td style="width: 76%; padding-right: 2px;">
                    <input type="text" id="userInput" placeholder="在此输入..." spellcheck="false" autocorrect="off"
                        autocapitalize="off" autocomplete="off">
                </td>
                <td style="width: 24%;">
                    <button type="submit" id="sendBtn">发送</button>
                </td>
            </tr>
        </table>
    </form>
    <script>

        // 针对极老浏览器可能没有 XMLHttpRequest 的情况
        if (typeof XMLHttpRequest === "undefined") {
            window.XMLHttpRequest = function () {
                try { return new ActiveXObject("Msxml2.XMLHTTP.6.0"); } catch (e) { }
                try { return new ActiveXObject("Msxml2.XMLHTTP.3.0"); } catch (e) { }
                try { return new ActiveXObject("Microsoft.XMLHTTP"); } catch (e) { }
                throw new Error("此浏览器不支持 AJAX");
            };
        }
        // --- 2005 级硬件兼容补丁 ---
        if (!window.JSON) {
            window.JSON = {
                // 解析 JSON：利用 eval 的原始力量
                parse: function (sJSON) {
                    try {
                        // 安全起见，加上括号确保 eval 将其视为表达式而非代码块
                        return eval('(' + sJSON + ')');
                    } catch (e) {
                        return null;
                    }
                },
                // 序列化 JSON：手动递归实现（2005年还没有简单的 stringify）
                stringify: function (v) {
                    var i, s = "", len;
                    if (v === null) return "null";
                    if (typeof v === 'number' || typeof v === 'boolean') return v.toString();
                    if (typeof v === 'string') return '"' + v.replace(/"/g, '\\"') + '"';

                    if (v instanceof Array) {
                        len = v.length;
                        for (i = 0; i < len; i++) {
                            s += (s ? "," : "") + this.stringify(v[i]);
                        }
                        return "[" + s + "]";
                    }
                    if (typeof v === 'object') {
                        for (i in v) {
                            if (v.hasOwnProperty(i)) {
                                s += (s ? "," : "") + '"' + i + '":' + this.stringify(v[i]);
                            }
                        }
                        return "{" + s + "}";
                    }
                    return "";
                }
            };
        }
        // --- 补丁结束 ---
        // 【纯净 ES5 语法】不使用 let/const，不使用箭头函数，不使用 async/await
        var chatBox = document.getElementById('chat');
        var input = document.getElementById('userInput');
        var btn = document.getElementById('sendBtn');
        var historyLog = [];

        /* --- 终极兼容补丁：手动计算绝对高度，防止老浏览器 top/bottom 塌陷 --- */
        function resizeChatBox() {
            // 获取屏幕真实可视高度 (兼容各种老旧浏览器的写法)
            var clientHeight = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;

            // 屏幕高度 - 标题栏高度(32) - 底部输入框预留高度(50，多留5px防重叠)
            var calculatedHeight = clientHeight - 32 - 50;

            // 显式赋予像素高度
            chatBox.style.height = calculatedHeight + 'px';
        }

        // 页面加载完毕后执行计算，并尝试聚焦
        window.onload = function () {
            resizeChatBox();
            // 注意：Opera Mini 等老旧浏览器可能不支持通过 JS 强制唤起软键盘，但这行代码不会报错
            if (input) input.focus();
        };

        // 监听屏幕旋转（当年诺基亚推开侧滑盖/横竖屏切换时触发）
        window.onresize = function () {
            resizeChatBox();
        };


        // 添加消息到聊天框
        function addMessage(sender, text, isAi) {
            var div = document.createElement('div');
            div.className = 'msg ' + (isAi ? 'ai-msg' : 'user-msg');

            // 老式的字符串拼接
            div.innerHTML = '<b>' + sender + ':</b><br/>' + text.replace(/\n/g, '<br/>');

            chatBox.appendChild(div);
            // 滚动到底部
            chatBox.scrollTop = chatBox.scrollHeight;
            /* --- 优化 3：清理老旧 DOM 节点 --- */
            // 如果消息超过 10 条，移除最早的一条，防止诺基亚浏览器崩溃
            if (chatBox.childNodes.length > 10) {
                chatBox.removeChild(chatBox.childNodes[0]);
            }

        }

        // 发送消息核心逻辑
        function sendMessage() {
            var text = input.value;
            // 如果为空则不执行
            if (text === null || text === '') {
                return;
            }

            // 锁定按钮，清空输入框
            input.value = '';
            btn.disabled = true;
            btn.innerHTML = '发送中';

            addMessage('我', text, false);

            // 诺基亚时代的网络请求：XMLHttpRequest (AJAX 祖师爷)
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/gemini?t=' + new Date().getTime(), true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onreadystatechange = function () {
                // 4 表示请求完成
                if (xhr.readyState === 4) {
                    // 解锁按钮
                    btn.disabled = false;
                    btn.innerHTML = '发送';

                    if (xhr.status === 200) {
                        try {
                            // Opera 12 支持原生的 JSON 解析
                            var res = JSON.parse(xhr.responseText);
                            var reply = res.reply ? res.reply : '无返回内容';

                            // 【新增这行】利用正则剔除所有现代 4 字节 Emoji 以及部分老旧图形符号
                            reply = reply.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|[\u2600-\u27BF]/g, '');

                            addMessage('AI', reply, true);

                            // 保存历史记录给 Gemini (最多留 8 条防止炸内存)
                            historyLog.push({ q: text, a: reply });
                            if (historyLog.length > 8) {
                                historyLog.shift();
                            }
                        } catch (e) {
                            addMessage('系统', '解析数据失败', true);
                        }
                    } else {
                        addMessage('系统', '网络请求失败，状态码: ' + xhr.status, true);
                    }
                }
            };

            // 组装发给服务端的数据并发送
            var requestData = JSON.stringify({
                message: text,
                history: historyLog
            });
            xhr.send(requestData);
        }

        // 绑定回车键发送 (诺基亚全键盘 E72 必备)
        input.onkeypress = function (e) {
            var event = e || window.event;
            if (event.keyCode === 13) {
                sendMessage();
                return false;
            }
        };
    </script>

</body>

</html>
